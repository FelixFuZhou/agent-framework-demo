# ============================================
# AutoGen Demo - 软件开发团队多智能体协作
# 基于 Spring AI 实现
# ============================================

spring.application.name=autogen-demo

# --- Spring AI OpenAI 配置 ---
# 支持 OpenAI 官方API和任何兼容API (DeepSeek, 通义千问, Ollama等)

# API Key
spring.ai.openai.api-key=${DASHSCOPE_API_KEY:your-api-key-here}

# API Base URL (OpenAI默认: https://api.openai.com)
# DeepSeek: https://api.deepseek.com
# 通义千问 DashScope: https://dashscope.aliyuncs.com/compatible-mode
# 本地Ollama: http://localhost:11434
spring.ai.openai.base-url=${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}

# 模型名称 (例: gpt-4o, deepseek-chat, qwen-turbo)
spring.ai.openai.chat.options.model=${LLM_MODEL_ID:qwen-turbo}

# 温度参数
spring.ai.openai.chat.options.temperature=0.7

# 关闭Spring Boot banner，让控制台更清晰
spring.main.banner-mode=off

# 日志级别
logging.level.com.example.autogen=INFO
logging.level.org.springframework.ai=WARN
