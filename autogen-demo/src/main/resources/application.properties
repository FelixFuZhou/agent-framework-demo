# ============================================
# AutoGen Demo - 软件开发团队多智能体协作
# ============================================

spring.application.name=autogen-demo

# --- LLM 模型配置 ---
# 支持 OpenAI 官方API和任何兼容API (DeepSeek, 通义千问, Ollama等)

# 模型名称 (例: gpt-4o, deepseek-chat, qwen-plus)
llm.model=${LLM_MODEL_ID:gpt-4o}

# API Key
llm.api-key=${LLM_API_KEY:your-api-key-here}

# API Base URL (OpenAI默认: https://api.openai.com/v1)
# DeepSeek: https://api.deepseek.com/v1
# 本地Ollama: http://localhost:11434/v1
llm.base-url=${LLM_BASE_URL:https://api.openai.com/v1}

# 关闭Spring Boot banner，让控制台更清晰
spring.main.banner-mode=off

# 日志级别
logging.level.com.example.autogen=INFO
logging.level.org.springframework.web.client=WARN
