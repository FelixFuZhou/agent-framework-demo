# ============================================
# AgentScope Demo - 三国狼人杀游戏
# 基于 AgentScope 设计理念的 Java 实现
# ============================================

spring.application.name=agentscope-demo

# --- Spring AI OpenAI 配置 ---
spring.ai.openai.api-key=${DASHSCOPE_API_KEY:your-api-key-here}
spring.ai.openai.base-url=${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
spring.ai.openai.chat.options.model=${LLM_MODEL_ID:qwen-turbo}
spring.ai.openai.chat.options.temperature=0.8

# 关闭 Spring Boot banner
spring.main.banner-mode=off

# 日志级别
logging.level.com.example.agentscope=INFO
logging.level.org.springframework.ai=WARN
