spring.application.name=langgraph-demo

# LLM 配置（通过环境变量注入）
spring.ai.openai.api-key=${DASHSCOPE_API_KEY}
spring.ai.openai.base-url=${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
spring.ai.openai.chat.options.model=${LLM_MODEL_ID:qwen-turbo}

# 禁用 Web 服务器（纯 CLI 应用）
spring.main.web-application-type=none
